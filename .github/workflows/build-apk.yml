name: Build Flutter APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: 25.1.8937393

      - name: Get Flutter dependencies
        run: |
          cd capitol-flutter
          flutter pub get
          flutter doctor -v

      - name: Build APK
        run: |
          cd capitol-flutter
          flutter build apk --debug --verbose 2>&1 | tail -100

      - name: Check APK was built
        run: |
          ls -lh capitol-flutter/build/app/outputs/flutter-apk/app-debug.apk || echo "APK not found"
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: capitol-flutter/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            capitol-flutter/build/app/outputs/flutter-apk/app-debug.apk
            capitol-flutter/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Release APK
        run: |
          cd capitol-flutter
          flutter build apk --release
        if: startsWith(github.ref, 'refs/tags/')

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: app-release-apk
          path: capitol-flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
